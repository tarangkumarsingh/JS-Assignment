<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q6 - Contest Score Judge</title>
</head>
<body>
<script>
var a = parseInt(prompt("Enter a (correct answers):"));
var b = parseInt(prompt("Enter b (partially correct answers):"));
var c = parseInt(prompt("Enter c (wrong answers):"));

var score = 3 * a + b - 2 * c;

if (score < 0) {
    score = 0;
}

if (a + b + c > 50) {
    score -= 10;
}

var status;
if (score >= 60) {
    status = "PASS";
} else {
    status = "FAIL";
}

alert(score + ", " + status);
</script>
</body>
</html>
