<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q4 - Fare Calculator</title>
</head>
<body>
<script>
var base = parseInt(prompt("Enter base:"));
var distance = parseInt(prompt("Enter distance:"));
var minutesLate = parseInt(prompt("Enter minutesLate:"));
var seed = parseInt(prompt("Enter seed:"));

var fare = base + 7 * distance;

if (minutesLate > 15) {
    fare += 20;
}

if (distance > 10) {
    fare += Math.floor(fare * 10 / 100);
}

if (seed % 2 !== 0) {
    fare -= seed;
} else {
    fare += seed;
}

if (fare % 5 !== 0) {
    fare = fare + (5 - fare % 5);
}

alert(fare);
</script>
</body>
</html>
